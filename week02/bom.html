<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Book of Mormon - Top 10</title>
        <meta name="description" content="Javascript exercise that allows the user to build and edit a list of Book of Mormon scriptures">
        <meta name="author" content="Daniel Streeter">
        <link rel="stylesheet" href="styles/bom.css">
        <script src="scripts/bom.js" defer></script>
    </head>
    <body>
        <h1>Book of Mormon - Top 10</h1>
        <main>
            <label for="favchap">Enter Book and Chapter: </label>
            <input type="text" id="favchap" placeholder="Alma 5">
            <button type="submit">Add Chapter</button>
            <ul id="list"></ul>
        </main>
    </body>
</html>
